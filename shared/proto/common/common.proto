syntax = "proto3";

package common;

option go_package = "github.com/real-ass/shared/proto/common;commonpb";

import "google/protobuf/timestamp.proto";

// Timestamp wraps google.protobuf.Timestamp with helper methods.
message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

// Money represents a monetary value with currency.
message Money {
  int64 amount = 1;
  string currency = 2;
  int32 decimal_places = 3;
}

// PageInfo contains pagination metadata.
message PageInfo {
  int32 current_page = 1;
  int32 page_size = 2;
  int32 total_items = 3;
  int32 total_pages = 4;
  bool has_next_page = 5;
  bool has_previous_page = 6;
  optional string next_cursor = 7;
  optional string previous_cursor = 8;
}

// Metadata contains key-value pairs for additional context.
message Metadata {
  map<string, string> attributes = 1;
  map<string, string> labels = 2;
  map<string, string> annotations = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// ErrorResponse represents a standardized error response.
message ErrorResponse {
  string code = 1;
  string message = 2;
  repeated ErrorDetail details = 3;
  string request_id = 4;
  google.protobuf.Timestamp timestamp = 5;
  string documentation_url = 6;
}

message ErrorDetail {
  string field = 1;
  string message = 2;
  string code = 3;
}

// HealthCheckResponse represents the health status of a service.
message HealthCheckResponse {
  HealthStatus status = 1;
  string service = 2;
  string version = 3;
  map<string, ComponentHealth> components = 4;
  google.protobuf.Timestamp checked_at = 5;
  int64 uptime_seconds = 6;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_HEALTHY = 1;
  HEALTH_STATUS_DEGRADED = 2;
  HEALTH_STATUS_UNHEALTHY = 3;
}

message ComponentHealth {
  HealthStatus status = 1;
  string message = 2;
  map<string, string> details = 3;
}

// Empty is a generic empty message.
message Empty {}
