server:
  host: "0.0.0.0"
  port: 8082
  mode: "release" # debug, release, test

github:
  base_url: "https://api.github.com"
  access_token: "${GITHUB_ACCESS_TOKEN}"
  per_page: 100
  timeout: 30s
  rate_limit:
    requests_per_minute: 500
    burst_size: 50

postgres:
  host: "postgres"
  port: 5432
  dbname: "platform_db"
  user: "postgres"
  password: "postgres_secret"
  ssl_mode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

logging:
  level: "info"
  format: "json" # json, console
  output: "stdout"

cache:
  ttl: 10m
  cleanup_interval: 5m
