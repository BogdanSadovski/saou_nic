# Analytics Service Configuration
# Environment variables override these values.

server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: "10s"
  write_timeout: "30s"
  shutdown_timeout: "15s"

postgres:
  host: "postgres"
  port: 5432
  user: "postgres"
  password: "postgres_secret"
  dbname: "platform_db"
  sslmode: "disable"
  max_conns: 25
  min_conns: 5
  conn_timeout: "5s"

clickhouse:
  host: "clickhouse"
  port: 9000
  user: "clickhouse_user"
  password: "clickhouse_pass"
  dbname: "analytics"
  timeout: "30s"

kafka:
  brokers:
    - "kafka:9092"
  consumer_group: "analytics-service"
  topics:
    - "events"
    - "user-activity"
  min_bytes: 10240
  max_bytes: 10485760
  max_wait: "10s"

service:
  aggregation_interval: "5m"
  retention_days: 90
  export_page_size_max: 10000
  dashboard_cache_ttl: "5m"
  realtime_window_minutes: 15
