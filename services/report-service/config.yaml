server:
  port: "8082"
  read_timeout: 15s
  write_timeout: 60s
  idle_timeout: 60s

database:
  host: postgres
  port: 5432
  user: postgres
  password: postgres_secret
  dbname: platform_db
  ssl_mode: disable
  max_conns: 25

s3:
  endpoint: minio:9000
  access_key_id: minioadmin
  secret_access_key: minioadmin
  region: us-east-1
  bucket: reports
  use_ssl: false

generator:
  template_dir: ./internal/templates
  assets_dir: ./assets
  default_format: pdf
  max_file_size_mb: 50

service:
  report_retention_days: 90
  max_concurrent_jobs: 10
