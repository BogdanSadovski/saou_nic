name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.21"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - resume-service
          - github-service
          - interview-service
          - scoring-service
          - report-service
          - notification-service
          - analytics-service
          - admin-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: services/${{ matrix.service }}
          args: --timeout=5m

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Check formatting
        working-directory: frontend
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

  lint-ai-service:
    name: Lint AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/ai-service/requirements.txt

      - name: Install dependencies
        working-directory: services/ai-service
        run: pip install -r requirements.txt

      - name: Run Ruff linter
        working-directory: services/ai-service
        run: pip install ruff && ruff check src/

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    needs: [lint-go]
    strategy:
      matrix:
        service:
          - user-service
          - resume-service
          - github-service
          - interview-service
          - scoring-service
          - report-service
          - notification-service
          - analytics-service
          - admin-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Download dependencies
        working-directory: services/${{ matrix.service }}
        run: go mod download

      - name: Run tests with coverage
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: "postgres://test_user:test_password@localhost:5432/test_db?sslmode=disable"
          REDIS_URL: "redis://localhost:6379/0"
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.out
          retention-days: 7

  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    needs: [lint-ai-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/ai-service/requirements.txt

      - name: Install dependencies
        working-directory: services/ai-service
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        working-directory: services/ai-service
        env:
          OPENAI_API_KEY: test-key-placeholder
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test_db"
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-ai-service
          path: services/ai-service/coverage.xml
          retention-days: 7

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: frontend/coverage/
          retention-days: 7

  build-services:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-go, test-ai-service, test-frontend]
    strategy:
      matrix:
        service:
          - user-service
          - resume-service
          - github-service
          - interview-service
          - scoring-service
          - report-service
          - notification-service
          - analytics-service
          - admin-service
          - ai-service
          - frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: interview-platform/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  upload-coverage:
    name: Upload Combined Coverage
    runs-on: ubuntu-latest
    needs: [test-go, test-ai-service, test-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports/

      - name: Display coverage summary
        run: |
          echo "## Coverage Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for dir in coverage-reports/*/; do
            service=$(basename "$dir")
            echo "- **${service}**: coverage.out available" >> $GITHUB_STEP_SUMMARY
          done
