name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g., v1.2.3)"
        required: true
      skip_smoke_tests:
        description: "Skip smoke tests (emergency only)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: interview-platform
  NAMESPACE: interview-platform-production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        id: validate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: ${VERSION}. Expected: vMAJOR.MINOR.PATCH"
            exit 1
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying version: ${VERSION}"

  require-approval:
    name: Require Production Approval
    runs-on: ubuntu-latest
    needs: [validate-version]
    environment:
      name: production
      url: https://interview-platform.io
    steps:
      - name: Approval gate
        run: |
          echo "Production deployment approved for ${{ needs.validate-version.outputs.version }}"
          echo "Approved by: ${{ github.actor }}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-version, require-approval]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || echo "")
          if [ -n "${PREV_TAG}" ]; then
            CHANGELOG=$(git log --oneline "${PREV_TAG}..${{ github.sha }}" | head -20)
          else
            CHANGELOG=$(git log --oneline -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${CHANGELOG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.version }}
          name: "Release ${{ needs.validate-version.outputs.version }}"
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            **Deployed by:** ${{ github.actor }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-version, require-approval, create-release]
    strategy:
      matrix:
        phase: [canary, full]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.PRODUCTION_KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy canary (10% traffic)
        if: matrix.phase == 'canary'
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          SERVICES="user-service resume-service github-service interview-service scoring-service report-service notification-service analytics-service admin-service ai-service frontend"

          echo "Starting canary deployment for ${VERSION}"

          for svc in $SERVICES; do
            echo "Deploying canary for ${svc}..."
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.REGISTRY }}/${{ github.repository }}/${svc}:${VERSION} \
              -n ${{ env.NAMESPACE }} --record
          done

          echo "Waiting for canary rollout..."
          for svc in $SERVICES; do
            kubectl rollout status deployment/${svc} \
              -n ${{ env.NAMESPACE }} --timeout=300s
          done

          echo "Canary deployment complete. Monitoring for 5 minutes..."
          sleep 300

      - name: Canary smoke tests
        if: matrix.phase == 'canary' && github.event.inputs.skip_smoke_tests != 'true'
        run: |
          echo "Running smoke tests against canary..."
          curl -f --retry 3 --retry-delay 10 \
            https://interview-platform.io/api/health || exit 1

          echo "Canary smoke tests passed"

      - name: Promote to full rollout
        if: matrix.phase == 'full'
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          SERVICES="user-service resume-service github-service interview-service scoring-service report-service notification-service analytics-service admin-service ai-service frontend"

          echo "Promoting to full production rollout"

          for svc in $SERVICES; do
            echo "Updating ${svc} to ${VERSION}"
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.REGISTRY }}/${{ github.repository }}/${svc}:${VERSION} \
              -n ${{ env.NAMESPACE }} --record
          done

      - name: Wait for full rollout
        if: matrix.phase == 'full'
        run: |
          SERVICES="user-service resume-service github-service interview-service scoring-service report-service notification-service analytics-service admin-service ai-service frontend"
          for svc in $SERVICES; do
            echo "Waiting for ${svc} rollout to complete..."
            kubectl rollout status deployment/${svc} \
              -n ${{ env.NAMESPACE }} --timeout=600s
          done

      - name: Verify production
        if: matrix.phase == 'full'
        run: |
          echo "Verifying production deployment..."
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=interview-platform
          kubectl get svc -n ${{ env.NAMESPACE }}

          curl -f --retry 5 --retry-delay 10 \
            https://interview-platform.io/api/health || exit 1

          echo "Production deployment verified successfully"

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: Production deployed\nVersion: ${{ needs.validate-version.outputs.version }}\nBy: ${{ github.actor }}\nURL: https://interview-platform.io"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
