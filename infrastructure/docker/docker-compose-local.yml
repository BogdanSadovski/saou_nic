version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
      POSTGRES_INITDB_ARGS: "-A trust"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: ../../services/user-service
      dockerfile: Dockerfile
    environment:
      CONFIG_PATH: /etc/user-service/config.yaml
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: user_service
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/user-service/config.yaml:/etc/user-service/config.yaml:ro

volumes:
  postgres_data:
