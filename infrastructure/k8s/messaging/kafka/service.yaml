apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: default
  labels:
    app: kafka
    component: messaging
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: jmx
      port: 9999
      targetPort: 9999
      protocol: TCP
    - name: metrics
      port: 9308
      targetPort: 9308
      protocol: TCP
  selector:
    app: kafka
    component: messaging
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-internal
  namespace: default
  labels:
    app: kafka
    component: messaging
    internal: "true"
spec:
  type: ClusterIP
  ports:
    - name: kafka-internal
      port: 9093
      targetPort: 9093
      protocol: TCP
  selector:
    app: kafka
    component: messaging
