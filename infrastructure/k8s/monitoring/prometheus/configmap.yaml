apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: default
  labels:
    app: prometheus
    component: monitoring
data:
  prometheus.yml: |
    # Prometheus Global Configuration
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    # Alertmanager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    # Rule files
    rule_files:
      - /etc/prometheus/rules/*.yml

    # Scrape configurations
    scrape_configs:
      # Prometheus self-monitoring
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
            labels:
              instance: prometheus

      # Application Services
      - job_name: recommendation-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - recommendation-service:8080
            labels:
              service: recommendation
              environment: production

      - job_name: analytics-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - analytics-service:8080
            labels:
              service: analytics
              environment: production

      - job_name: auth-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - auth-service:8080
            labels:
              service: auth
              environment: production

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service:8080
            labels:
              service: user
              environment: production

      - job_name: content-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - content-service:8080
            labels:
              service: content
              environment: production

      # Database metrics
      - job_name: postgres
        static_configs:
          - targets:
              - postgres:9187
            labels:
              database: postgresql
              environment: production

      - job_name: redis
        static_configs:
          - targets:
              - redis:9121
            labels:
              database: redis
              environment: production

      - job_name: clickhouse
        static_configs:
          - targets:
              - clickhouse:9116
            labels:
              database: clickhouse
              environment: production

      # Messaging metrics
      - job_name: rabbitmq
        static_configs:
          - targets:
              - rabbitmq:9419
            labels:
              messaging: rabbitmq
              environment: production

      - job_name: kafka
        static_configs:
          - targets:
              - kafka:9308
            labels:
              messaging: kafka
              environment: production

      # Infrastructure metrics
      - job_name: nginx-ingress
        metrics_path: /metrics
        static_configs:
          - targets:
              - ingress-nginx-controller-metrics:10254
            labels:
              component: ingress
              environment: production

      - job_name: node-exporter
        static_configs:
          - targets:
              - node-exporter:9100
            labels:
              component: node
              environment: production

      # Frontend metrics
      - job_name: frontend
        metrics_path: /metrics
        static_configs:
          - targets:
              - frontend:8080
            labels:
              service: frontend
              environment: production

      # Kubernetes service discovery for pods with metrics annotation
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
