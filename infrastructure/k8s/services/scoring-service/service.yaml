apiVersion: v1
kind: Service
metadata:
  name: scoring-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: scoring-service
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8085"
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: scoring-service
