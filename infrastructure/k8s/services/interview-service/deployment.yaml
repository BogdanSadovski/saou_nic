apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: interview-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: real-ass-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: interview-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: interview-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: interview-service
          image: real-ass/interview-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
            - containerPort: 8084
              name: ws
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_PORT
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: AI_SERVICE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: LOG_LEVEL
            - name: SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: interview-service-config
                  key: SERVICE_PORT
            - name: MAX_INTERVIEW_DURATION_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: interview-service-config
                  key: MAX_INTERVIEW_DURATION_MINUTES
            - name: QUESTION_COUNT_PER_INTERVIEW
              valueFrom:
                configMapKeyRef:
                  name: interview-service-config
                  key: QUESTION_COUNT_PER_INTERVIEW
            - name: RECORDING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: interview-service-config
                  key: RECORDING_ENABLED
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          volumeMounts:
            - name: recording-storage
              mountPath: /data/recordings
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: recording-storage
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
