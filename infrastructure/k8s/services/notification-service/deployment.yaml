apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: real-ass-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification-service
          image: real-ass/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: LOG_LEVEL
            - name: SMTP_HOST
              value: "smtp.gmail.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: "notifications@real-ass.example.com"
            - name: NOTIFICATION_CHANNELS
              value: "email,webhook,websocket"
            - name: EMAIL_BATCH_SIZE
              value: "50"
            - name: EMAIL_BATCH_DELAY_SECONDS
              value: "60"
            - name: RETRY_MAX_ATTEMPTS
              value: "3"
            - name: RETRY_DELAY_SECONDS
              value: "30"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: SMTP_PASSWORD
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8087
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
