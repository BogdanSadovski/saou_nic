apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: report-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: real-ass-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: report-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: report-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: report-service
          image: real-ass/report-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_PORT
            - name: SCORING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: SCORING_SERVICE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: LOG_LEVEL
            - name: REPORT_STORAGE_PATH
              value: "/data/reports"
            - name: MAX_REPORT_SIZE_MB
              value: "50"
            - name: REPORT_RETENTION_DAYS
              value: "90"
            - name: EXPORT_FORMATS
              value: "pdf,csv,json,xlsx"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8086
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 768Mi
          volumeMounts:
            - name: report-storage
              mountPath: /data/reports
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: report-storage
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
