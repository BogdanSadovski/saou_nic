apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: admin-service
    app.kubernetes.io/component: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8089"
spec:
  type: ClusterIP
  ports:
    - port: 8089
      targetPort: 8089
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: admin-service
