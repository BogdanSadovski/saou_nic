apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-service-config
  namespace: real-ass
  labels:
    app.kubernetes.io/name: resume-service
    app.kubernetes.io/component: backend
data:
  SERVICE_PORT: "8081"
  SERVICE_NAME: "resume-service"

  # Resume service specific settings
  MAX_RESUME_SIZE_MB: "10"
  ALLOWED_FILE_TYPES: "pdf,doc,docx,txt"
  RESUME_STORAGE_PATH: "/data/resumes"

  # Parsing settings
  PARSING_TIMEOUT_SECONDS: "30"
  MAX_EXTRACTED_FIELDS: "50"

  # Cache settings
  CACHE_TTL_SECONDS: "3600"
  CACHE_ENABLED: "true"
