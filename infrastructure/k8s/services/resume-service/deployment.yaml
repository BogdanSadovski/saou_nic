apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-service
  namespace: real-ass
  labels:
    app.kubernetes.io/name: resume-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: real-ass-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: resume-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resume-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: resume-service
          image: real-ass/resume-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: POSTGRES_USER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: REDIS_PORT
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: RABBITMQ_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: real-ass-common-config
                  key: LOG_LEVEL
            - name: SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: resume-service-config
                  key: SERVICE_PORT
            - name: MAX_RESUME_SIZE_MB
              valueFrom:
                configMapKeyRef:
                  name: resume-service-config
                  key: MAX_RESUME_SIZE_MB
            - name: CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: resume-service-config
                  key: CACHE_TTL_SECONDS
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: REDIS_PASSWORD
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: real-ass-secrets
                  key: ENCRYPTION_KEY
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: resume-storage
              mountPath: /data/resumes
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: resume-storage
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
