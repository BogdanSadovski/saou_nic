apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: default
  labels:
    app: clickhouse
    component: database
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
    - name: tcp
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: inter-server
      port: 9009
      targetPort: 9009
      protocol: TCP
    - name: metrics
      port: 9116
      targetPort: 9116
      protocol: TCP
  selector:
    app: clickhouse
    component: database
